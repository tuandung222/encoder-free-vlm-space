<div class="d3-multimodal-stack"></div>
<style>
  .d3-multimodal-stack { position: relative; }
  .d3-multimodal-stack svg { width: 100%; height: auto; display: block; }
  .d3-multimodal-stack .box-title { fill: var(--text-color); font-weight: 700; }
  .d3-multimodal-stack .box-sub { fill: var(--muted-color); }
  .d3-multimodal-stack .out-label { fill: var(--text-color); font-weight: 700; }
  .d3-multimodal-stack .legend { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; margin-top: 12px; }
  .d3-multimodal-stack .legend-title { font-size: 12px; font-weight: 700; color: var(--text-color); }
  .d3-multimodal-stack .legend .items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
  .d3-multimodal-stack .legend .item { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; font-size: 12px; color: var(--text-color); }
  .d3-multimodal-stack .legend .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border-color); }
  .d3-multimodal-stack .node { cursor: pointer; }
  .d3-multimodal-stack .node rect { transition: stroke-width .12s ease, filter .12s ease; }
  .d3-multimodal-stack .hint { margin-top: 6px; font-size: 11.5px; color: var(--muted-color); }
</style>
<script>
  (() => {
    const ensureD3 = (cb) => {
      if (window.d3 && typeof window.d3.select === 'function') return cb();
      let s = document.getElementById('d3-cdn-script');
      if (!s) { s = document.createElement('script'); s.id = 'd3-cdn-script'; s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js'; document.head.appendChild(s); }
      const onReady = () => { if (window.d3 && typeof window.d3.select === 'function') cb(); };
      s.addEventListener('load', onReady, { once: true });
      if (window.d3) onReady();
    };

    const bootstrap = () => {
      const scriptEl = document.currentScript;
      let container = scriptEl ? scriptEl.previousElementSibling : null;
      if (!(container && container.classList && container.classList.contains('d3-multimodal-stack'))) {
        const cs = Array.from(document.querySelectorAll('.d3-multimodal-stack')).filter(el => !(el.dataset && el.dataset.mounted === 'true'));
        container = cs[cs.length - 1] || null;
      }
      if (!container) return;
      if (container.dataset) { if (container.dataset.mounted === 'true') return; container.dataset.mounted = 'true'; }
      container.style.position = container.style.position || 'relative';

      // Named semantic palette — the article's figure descriptions specify colours by name
      // (purple inputs, blue vision, teal audio, green connectors, pink LM/output). We keep
      // them theme-aware by tinting toward --surface-bg and using --text-color for labels.
      const PAL = { blue: '#5B9BD5', green: '#5FB97F', pink: '#E27BA4', red: '#E06C6C', purple: '#9B82DE', yellow: '#E3B25A', teal: '#46AFB0', gray: '#98A2AD' };
      const ROLE = { input: PAL.purple, vision: PAL.blue, audio: PAL.teal, connector: PAL.green, lm: PAL.pink };
      const tint = (hex, amt) => `color-mix(in oklab, ${hex} ${Math.round((amt == null ? 0.3 : amt) * 100)}%, var(--surface-bg))`;

      // ---- single shared HTML tooltip (interactivity) ----
      let tip = container.querySelector('.d3-tooltip'), tipInner;
      if (!tip) {
        tip = document.createElement('div'); tip.className = 'd3-tooltip';
        Object.assign(tip.style, { position: 'absolute', top: '0', left: '0', transform: 'translate(-9999px,-9999px)', pointerEvents: 'none', maxWidth: '260px', padding: '8px 10px', borderRadius: '8px', fontSize: '12px', lineHeight: '1.4', border: '1px solid var(--border-color)', background: 'var(--surface-bg)', color: 'var(--text-color)', boxShadow: '0 4px 24px rgba(0,0,0,.18)', opacity: '0', transition: 'opacity .12s ease', zIndex: '5' });
        tipInner = document.createElement('div'); tip.appendChild(tipInner); container.appendChild(tip);
      } else { tipInner = tip.firstChild || tip; }
      const showTip = (event, html) => { tipInner.innerHTML = html; const [px, py] = d3.pointer(event, container); tip.style.transform = `translate(${px + 14}px, ${py + 14}px)`; tip.style.opacity = '1'; };
      const hideTip = () => { tip.style.opacity = '0'; };

      const VBW = 1000, VBH = 580;
      const svg = d3.select(container).append('svg')
        .attr('viewBox', `0 0 ${VBW} ${VBH}`)
        .attr('preserveAspectRatio', 'xMidYMid meet')
        .style('width', '100%').style('height', 'auto').style('display', 'block');

      const defs = svg.append('defs');
      const mk = (id, color) => defs.append('marker')
        .attr('id', id).attr('viewBox', '0 0 10 10').attr('refX', 8).attr('refY', 5)
        .attr('markerWidth', 7).attr('markerHeight', 7).attr('orient', 'auto-start-reverse')
        .append('path').attr('d', 'M0,0 L10,5 L0,10 z').attr('fill', color);
      mk('mm-arrow', 'var(--muted-color)');

      // a hoverable rounded box with a centered title and optional subtitle (wrapped) + tooltip
      function box(g, x, y, w, h, fill, title, sub, tipHtml) {
        const grp = g.append('g').attr('class', 'node');
        const rect = grp.append('rect').attr('x', x).attr('y', y).attr('width', w).attr('height', h)
          .attr('rx', 14).attr('ry', 14)
          .attr('fill', tint(fill, 0.3)).attr('stroke', fill).attr('stroke-width', 2);
        const cx = x + w / 2;
        const hasSub = sub && sub.length;
        grp.append('text').attr('class', 'box-title').attr('x', cx)
          .attr('y', hasSub ? y + h / 2 - 6 : y + h / 2)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
          .attr('font-size', 20).text(title);
        if (hasSub) {
          const t = grp.append('text').attr('class', 'box-sub').attr('x', cx)
            .attr('y', y + h / 2 + 16).attr('text-anchor', 'middle').attr('font-size', 12.5);
          sub.forEach((line, i) => t.append('tspan').attr('x', cx).attr('dy', i === 0 ? 0 : 15).text(line));
        }
        if (tipHtml) {
          grp.on('mouseenter', () => rect.attr('stroke-width', 4))
            .on('mousemove', (e) => showTip(e, tipHtml))
            .on('mouseleave', () => { rect.attr('stroke-width', 2); hideTip(); });
        }
        return grp;
      }
      function arrow(g, x1, y1, x2, y2) {
        g.append('path').attr('d', `M${x1},${y1} L${x2},${y2}`)
          .attr('fill', 'none').attr('stroke', 'var(--muted-color)').attr('stroke-width', 2)
          .attr('marker-end', 'url(#mm-arrow)');
      }

      function render() {
        svg.selectAll('g').remove();
        const g = svg.append('g');

        // Vertical rows
        const visRow = 100;   // vision path center
        const audRow = 250;   // audio path center
        const txtRow = 420;   // text tokens row center

        // Left column inputs (purple)
        const inX = 24, inW = 175, inH = 58;
        box(g, inX, visRow - inH / 2, inW, inH, ROLE.input, 'Ảnh', null,
          '<b>Ảnh</b><br>Các pixel thô.');
        box(g, inX, audRow - inH / 2, inW, inH, ROLE.input, 'Âm thanh (dạng sóng)', null,
          '<b>Âm thanh</b><br>Các mẫu biên độ thô.');
        box(g, inX, txtRow - inH / 2, inW, inH, ROLE.input, 'Token văn bản', null,
          '<b>Token văn bản</b><br>Đi thẳng vào mô hình ngôn ngữ (LM) — không cần bộ mã hóa.');

        // Vision encoder (blue) + Audio encoder (teal)
        const encX = 270, encW = 300, encH = 96;
        box(g, encX, visRow - encH / 2, encW, encH, ROLE.vision, 'Bộ mã hóa Thị giác',
          ['ảnh → token thị giác', 'nhiều lớp attention'],
          '<b>Bộ mã hóa thị giác</b><br>ViT được huấn luyện trước — chuyển đổi hình ảnh thành các token thị giác thông qua nhiều lớp attention.');
        box(g, encX, audRow - encH / 2, encW, encH, ROLE.audio, 'Bộ mã hóa Âm thanh',
          ['dạng sóng → token âm thanh', 'các lớp attention'],
          '<b>Bộ mã hóa âm thanh</b><br>Chuyển đổi dạng sóng thành các token âm thanh thông qua các lớp attention.');

        // Connectors (green, small)
        const coX = 620, coW = 120, coH = 60;
        box(g, coX, visRow - coH / 2, coW, coH, ROLE.connector, 'Bộ kết nối', null,
          '<b>Bộ kết nối</b><br>Chiếu đầu ra của bộ mã hóa lên kích thước ẩn của mô hình ngôn ngữ (LM).');
        box(g, coX, audRow - coH / 2, coW, coH, ROLE.connector, 'Bộ kết nối', null,
          '<b>Bộ kết nối</b><br>Chiếu đầu ra của bộ mã hóa lên kích thước ẩn của mô hình ngôn ngữ (LM).');

        // Language Model (pink, tall) on the right
        const lmX = 790, lmW = 150, lmTop = visRow - 50, lmBot = txtRow + 50;
        const lmH = lmBot - lmTop, lmMidY = lmTop + lmH / 2;
        box(g, lmX, lmTop, lmW, lmH, ROLE.lm, 'Mô hình Ngôn ngữ', ['(bộ giải mã)'],
          '<b>Mô hình ngôn ngữ</b><br>Phải chờ cả hai bộ mã hóa hoàn thành trước khi có thể bắt đầu tạo.');

        // Output: "Text" pink box to the right of the LM
        const outX = 790, outW = 150, outH = 50, outY = lmBot + 28;
        box(g, outX, outY, outW, outH, ROLE.lm, 'Văn bản', null,
          '<b>Đầu ra</b><br>Văn bản được tạo.');

        // Arrows: inputs -> encoders
        arrow(g, inX + inW, visRow, encX - 4, visRow);
        arrow(g, inX + inW, audRow, encX - 4, audRow);
        // encoders -> connectors
        arrow(g, encX + encW, visRow, coX - 4, visRow);
        arrow(g, encX + encW, audRow, coX - 4, audRow);
        // connectors -> LM
        arrow(g, coX + coW, visRow, lmX - 4, lmMidY - 28);
        arrow(g, coX + coW, audRow, lmX - 4, lmMidY);

        // Text Tokens -> LM (bypass encoders/connectors): right-angle path into LM left edge
        const tieY = lmMidY + 30;
        g.append('path')
          .attr('d', `M${inX + inW},${txtRow} L${lmX - 40},${txtRow} L${lmX - 40},${tieY} L${lmX - 4},${tieY}`)
          .attr('fill', 'none').attr('stroke', 'var(--muted-color)').attr('stroke-width', 2)
          .attr('marker-end', 'url(#mm-arrow)');

        // LM -> output Text (downward into the Text box)
        arrow(g, lmX + lmW / 2, lmBot, outX + outW / 2, outY - 4);
      }
      render();

      // Legend (HTML, dark-mode aware via CSS vars)
      let legend = container.querySelector('.legend');
      if (!legend) {
        legend = document.createElement('div'); legend.className = 'legend';
        legend.innerHTML = '<div class="legend-title">Chú giải</div><div class="items"></div>';
        container.appendChild(legend);
      }
      const items = legend.querySelector('.items');
      const legendData = [['Đầu vào', ROLE.input], ['Bộ mã hóa Thị giác', ROLE.vision], ['Bộ mã hóa Âm thanh', ROLE.audio], ['Bộ kết nối', ROLE.connector], ['Mô hình Ngôn ngữ', ROLE.lm]];
      items.innerHTML = '';
      legendData.forEach(([name, color]) => {
        const el = document.createElement('span'); el.className = 'item';
        const sw = document.createElement('span'); sw.className = 'swatch';
        sw.style.background = tint(color, 0.3); sw.style.borderColor = color;
        const tx = document.createElement('span'); tx.textContent = name;
        el.appendChild(sw); el.appendChild(tx); items.appendChild(el);
      });

      if (!container.querySelector('.hint')) { const h = document.createElement('div'); h.className = 'hint'; h.textContent = 'Di chuột qua khối bất kỳ để xem chi tiết.'; container.appendChild(h); }

      if (window.ResizeObserver) { const ro = new ResizeObserver(() => render()); ro.observe(container); }
      else { window.addEventListener('resize', render); }
    };

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => ensureD3(bootstrap), { once: true }); }
    else { ensureD3(bootstrap); }
  })();
</script>
