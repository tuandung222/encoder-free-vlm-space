<div class="d3-patch-grid-unroll"></div>
<style>
  .d3-patch-grid-unroll { position: relative; }
  .d3-patch-grid-unroll svg { width: 100%; height: auto; display: block; }
  .d3-patch-grid-unroll .caption { fill: var(--text-color); font-weight: 700; }
  .d3-patch-grid-unroll .muted { fill: var(--muted-color); }
  .d3-patch-grid-unroll .cell { cursor: pointer; transition: stroke-width .1s ease, opacity .1s ease; }
  .d3-patch-grid-unroll .vec { cursor: pointer; transition: stroke-width .1s ease; }
  .d3-patch-grid-unroll .hint { margin-top: 6px; font-size: 11.5px; color: var(--muted-color); }
</style>
<script>
  (() => {
    const ensureD3 = (cb) => {
      if (window.d3 && typeof window.d3.select === 'function') return cb();
      let s = document.getElementById('d3-cdn-script');
      if (!s) { s = document.createElement('script'); s.id = 'd3-cdn-script'; s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js'; document.head.appendChild(s); }
      const onReady = () => { if (window.d3 && typeof window.d3.select === 'function') cb(); };
      s.addEventListener('load', onReady, { once: true });
      if (window.d3) onReady();
    };

    const bootstrap = () => {
      const scriptEl = document.currentScript;
      let container = scriptEl ? scriptEl.previousElementSibling : null;
      if (!(container && container.classList && container.classList.contains('d3-patch-grid-unroll'))) {
        const cs = Array.from(document.querySelectorAll('.d3-patch-grid-unroll')).filter(el => !(el.dataset && el.dataset.mounted === 'true'));
        container = cs[cs.length - 1] || null;
      }
      if (!container) return;
      if (container.dataset) { if (container.dataset.mounted === 'true') return; container.dataset.mounted = 'true'; }
      container.style.position = container.style.position || 'relative';

      // Named semantic palette — the article's figure descriptions specify colours by name
      // (purple Image/Text, blue Encoder/Embedder, green Connector, pink Decoder). We keep
      // them theme-aware by tinting toward --surface-bg and using --text-color for labels.
      const PAL = { blue: '#5B9BD5', green: '#5FB97F', pink: '#E27BA4', red: '#E06C6C', purple: '#9B82DE', yellow: '#E3B25A', teal: '#46AFB0', gray: '#98A2AD' };
      const tint = (hex, amt) => `color-mix(in oklab, ${hex} ${Math.round((amt == null ? 0.3 : amt) * 100)}%, var(--surface-bg))`;

      // ---- single shared HTML tooltip (interactivity) ----
      let tip = container.querySelector('.d3-tooltip'), tipInner;
      if (!tip) {
        tip = document.createElement('div'); tip.className = 'd3-tooltip';
        Object.assign(tip.style, { position: 'absolute', top: '0', left: '0', transform: 'translate(-9999px,-9999px)', pointerEvents: 'none', maxWidth: '260px', padding: '8px 10px', borderRadius: '8px', fontSize: '12px', lineHeight: '1.4', border: '1px solid var(--border-color)', background: 'var(--surface-bg)', color: 'var(--text-color)', boxShadow: '0 4px 24px rgba(0,0,0,.18)', opacity: '0', transition: 'opacity .12s ease', zIndex: '5' });
        tipInner = document.createElement('div'); tip.appendChild(tipInner); container.appendChild(tip);
      } else { tipInner = tip.firstChild || tip; }
      const showTip = (event, html) => { tipInner.innerHTML = html; const [px, py] = d3.pointer(event, container); tip.style.transform = `translate(${px + 14}px, ${py + 14}px)`; tip.style.opacity = '1'; };
      const hideTip = () => { tip.style.opacity = '0'; };

      const VBW = 1000, VBH = 460;
      const svg = d3.select(container).append('svg')
        .attr('viewBox', `0 0 ${VBW} ${VBH}`)
        .attr('preserveAspectRatio', 'xMidYMid meet')
        .style('width', '100%').style('height', 'auto').style('display', 'block');

      const defs = svg.append('defs');
      defs.append('marker')
        .attr('id', 'unroll-arrow').attr('viewBox', '0 0 10 10').attr('refX', 8).attr('refY', 5)
        .attr('markerWidth', 7).attr('markerHeight', 7).attr('orient', 'auto-start-reverse')
        .append('path').attr('d', 'M0,0 L10,5 L0,10 z').attr('fill', 'var(--muted-color)');

      // The "image" being patchified is the real Hugging Face logo. We sample it once
      // into a 16×16 grid so each of the 256 patches takes the logo's colour there.
      const LOGO = '/hf-logo.svg';
      const EMPTY = 'color-mix(in oklab, var(--muted-color) 6%, var(--surface-bg))';
      let logoColors = null;
      const faceFill = (row, col) => (logoColors && logoColors[row * 16 + col]) || EMPTY;
      const sampleLogo = (cb) => {
        try {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => {
            try {
              const n = 16, cv = document.createElement('canvas');
              cv.width = n; cv.height = n;
              const ctx = cv.getContext('2d', { willReadFrequently: true });
              const iw = img.naturalWidth || 95, ih = img.naturalHeight || 88;
              const s = Math.min(n / iw, n / ih), dw = iw * s, dh = ih * s;
              ctx.clearRect(0, 0, n, n);
              ctx.imageSmoothingEnabled = true;
              ctx.drawImage(img, (n - dw) / 2, (n - dh) / 2, dw, dh);
              const d = ctx.getImageData(0, 0, n, n).data;
              logoColors = [];
              for (let i = 0; i < n * n; i++) {
                logoColors.push(d[i * 4 + 3] < 60 ? null : `rgb(${d[i * 4]}, ${d[i * 4 + 1]}, ${d[i * 4 + 2]})`);
              }
            } catch (_) { logoColors = null; }
            cb();
          };
          img.onerror = () => cb();
          img.src = LOGO;
        } catch (_) { cb(); }
      };

      function render() {
        svg.selectAll('g').remove();

        // index -> { type: 'cell'|'vec', rect } maps so the two views can cross-highlight
        const cellByIdx = {};   // every index 0..255
        const vecByIdx = {};    // only the drawn flat-sequence vectors

        // ---- highlight helpers ----
        const highlightCell = (idx) => { const r = cellByIdx[idx]; if (r) r.attr('stroke', PAL.blue).attr('stroke-width', 2).attr('opacity', 1); };
        const resetCell = (idx) => { const r = cellByIdx[idx]; if (r) r.attr('stroke', 'var(--border-color)').attr('stroke-width', 0.5).attr('opacity', 1); };
        const highlightVec = (idx) => { const r = vecByIdx[idx]; if (r) r.attr('stroke-width', 3); };
        const resetVec = (idx) => { const r = vecByIdx[idx]; if (r) r.attr('stroke-width', 1); };

        // ---- LEFT: 16x16 patch grid ----
        const N = 16, cell = 22, gridW = N * cell; // 352px
        const gx = 40, gy = 56;
        const grid = svg.append('g');
        for (let row = 0; row < N; row++) {
          for (let col = 0; col < N; col++) {
            const idx = row * N + col;
            const r = grid.append('rect')
              .attr('class', 'cell')
              .attr('x', gx + col * cell).attr('y', gy + row * cell)
              .attr('width', cell).attr('height', cell)
              .attr('fill', faceFill(row, col))
              .attr('stroke', 'var(--border-color)').attr('stroke-width', 0.5);
            cellByIdx[idx] = r;
            r.on('mouseenter', () => { highlightCell(idx); highlightVec(idx); })
              .on('mousemove', (e) => showTip(e, `<b>Patch (row ${row}, col ${col})</b><br>Sequence index = r·16 + c = ${idx}`))
              .on('mouseleave', () => { resetCell(idx); resetVec(idx); hideTip(); });
          }
        }
        // minimal corner position labels
        const corner = (cx, cy, txt, anchor, dy) => grid.append('text')
          .attr('class', 'muted').attr('x', cx).attr('y', cy)
          .attr('text-anchor', anchor).attr('font-size', 10).attr('dy', dy).text(txt);
        corner(gx + 2, gy - 4, '(0,0)', 'start', 0);
        corner(gx + gridW - 2, gy - 4, '(0,15)', 'end', 0);
        corner(gx + 2, gy + gridW + 13, '(15,0)', 'start', 0);

        grid.append('text').attr('class', 'caption')
          .attr('x', gx + gridW / 2).attr('y', gy + gridW + 38)
          .attr('text-anchor', 'middle').attr('font-size', 15)
          .text('16 × 16 = 256 patches');

        // ---- ARROW: grid -> sequence ----
        const ax1 = gx + gridW + 24, ax2 = 632, ay = gy + gridW / 2;
        svg.append('text').attr('class', 'muted')
          .attr('x', (ax1 + ax2) / 2).attr('y', ay - 14)
          .attr('text-anchor', 'middle').attr('font-size', 13)
          .text('unroll row by row');
        svg.append('path')
          .attr('d', `M${ax1},${ay} L${ax2},${ay}`)
          .attr('fill', 'none').attr('stroke', 'var(--muted-color)').attr('stroke-width', 2.5)
          .attr('marker-end', 'url(#unroll-arrow)');

        // ---- RIGHT: flat sequence of patch vectors ----
        const seq = svg.append('g');
        const barW = 22, barH = 90, gap = 10;
        const seqY = ay - barH / 2;
        let cx = ax2 + 24;

        const drawVec = (idx, showLabel) => {
          const x = cx;
          const r = seq.append('rect')
            .attr('class', 'vec')
            .attr('x', x).attr('y', seqY)
            .attr('width', barW).attr('height', barH)
            .attr('rx', 4).attr('ry', 4)
            .attr('fill', faceFill(Math.floor(idx / N), idx % N))
            .attr('stroke', 'var(--border-color)').attr('stroke-width', 1);
          vecByIdx[idx] = r;
          const row = Math.floor(idx / N), col = idx % N;
          r.on('mouseenter', () => { highlightVec(idx); highlightCell(idx); })
            .on('mousemove', (e) => showTip(e, `<b>Sequence index ${idx}</b><br>Patch (row ${row}, col ${col})`))
            .on('mouseleave', () => { resetVec(idx); resetCell(idx); hideTip(); });
          if (showLabel) {
            seq.append('text').attr('class', 'muted')
              .attr('x', x + barW / 2).attr('y', seqY + barH + 16)
              .attr('text-anchor', 'middle').attr('font-size', 11).text(String(idx));
          }
          cx += barW + gap;
        };

        const ellipsis = () => {
          seq.append('text').attr('class', 'muted')
            .attr('x', cx + 14).attr('y', seqY + barH / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
            .attr('font-size', 24).text('⋯');
          cx += 38;
        };

        // leading patches (top-left of the image → background)
        [0, 1, 2].forEach((idx) => drawVec(idx, true));
        ellipsis();
        // a run from the middle of the image → these land on the logo (yellow)
        [119, 120, 121].forEach((idx) => drawVec(idx, true));
        ellipsis();
        // final patches (bottom-right → background)
        [254, 255].forEach((idx) => drawVec(idx, true));

        const seqStart = ax2 + 24;
        const seqEnd = cx - gap;
        seq.append('text').attr('class', 'muted')
          .attr('x', (seqStart + seqEnd) / 2).attr('y', seqY + barH + 38)
          .attr('text-anchor', 'middle').attr('font-size', 14)
          .text('flat sequence of 256 patch vectors');
      }
      render();
      sampleLogo(() => render());   // recolour patches once the logo has loaded

      if (!container.querySelector('.hint')) { const h = document.createElement('div'); h.className = 'hint'; h.textContent = 'Hover a patch to see its (row, col) and its position in the flat sequence.'; container.appendChild(h); }

      if (window.ResizeObserver) { const ro = new ResizeObserver(() => render()); ro.observe(container); }
      else { window.addEventListener('resize', render); }
    };

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => ensureD3(bootstrap), { once: true }); }
    else { ensureD3(bootstrap); }
  })();
</script>
