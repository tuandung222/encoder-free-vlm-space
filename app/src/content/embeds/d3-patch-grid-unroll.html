<div class="d3-patch-grid-unroll"></div>
<style>
  .d3-patch-grid-unroll { position: relative; }
  .d3-patch-grid-unroll svg { width: 100%; height: auto; display: block; }
  .d3-patch-grid-unroll .caption { fill: var(--text-color); font-weight: 700; }
  .d3-patch-grid-unroll .muted { fill: var(--muted-color); }
  .d3-patch-grid-unroll .frame { cursor: pointer; }
  .d3-patch-grid-unroll .tile { cursor: pointer; }
  .d3-patch-grid-unroll .hint { margin-top: 6px; font-size: 11.5px; color: var(--muted-color); }
</style>
<script>
  (() => {
    const ensureD3 = (cb) => {
      if (window.d3 && typeof window.d3.select === 'function') return cb();
      let s = document.getElementById('d3-cdn-script');
      if (!s) { s = document.createElement('script'); s.id = 'd3-cdn-script'; s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js'; document.head.appendChild(s); }
      const onReady = () => { if (window.d3 && typeof window.d3.select === 'function') cb(); };
      s.addEventListener('load', onReady, { once: true });
      if (window.d3) onReady();
    };

    const bootstrap = () => {
      const scriptEl = document.currentScript;
      let container = scriptEl ? scriptEl.previousElementSibling : null;
      if (!(container && container.classList && container.classList.contains('d3-patch-grid-unroll'))) {
        const cs = Array.from(document.querySelectorAll('.d3-patch-grid-unroll')).filter(el => !(el.dataset && el.dataset.mounted === 'true'));
        container = cs[cs.length - 1] || null;
      }
      if (!container) return;
      if (container.dataset) { if (container.dataset.mounted === 'true') return; container.dataset.mounted = 'true'; }
      container.style.position = container.style.position || 'relative';

      const PAL = { blue: '#5B9BD5' };

      // ---- single shared HTML tooltip ----
      let tip = container.querySelector('.d3-tooltip'), tipInner;
      if (!tip) {
        tip = document.createElement('div'); tip.className = 'd3-tooltip';
        Object.assign(tip.style, { position: 'absolute', top: '0', left: '0', transform: 'translate(-9999px,-9999px)', pointerEvents: 'none', maxWidth: '260px', padding: '8px 10px', borderRadius: '8px', fontSize: '12px', lineHeight: '1.4', border: '1px solid var(--border-color)', background: 'var(--surface-bg)', color: 'var(--text-color)', boxShadow: '0 4px 24px rgba(0,0,0,.18)', opacity: '0', transition: 'opacity .12s ease', zIndex: '5' });
        tipInner = document.createElement('div'); tip.appendChild(tipInner); container.appendChild(tip);
      } else { tipInner = tip.firstChild || tip; }
      const showTip = (event, html) => { tipInner.innerHTML = html; const [px, py] = d3.pointer(event, container); tip.style.transform = `translate(${px + 14}px, ${py + 14}px)`; tip.style.opacity = '1'; };
      const hideTip = () => { tip.style.opacity = '0'; };

      // ---- The "input image": a real raster drawn once at full resolution with canvas
      // vector primitives (a little landscape), then sliced into 32x32-px patches. Drawing
      // the scene with shapes — rather than an emoji glyph or external file — keeps the embed
      // fully self-contained and renders identically in every browser AND in PDF export
      // (color-emoji fonts don't paint reliably to canvas, and not at all in print). ----
      const SRC = 512, GRID = 16, PX = SRC / GRID; // 512 / 16 = 32 px per patch
      let srcCanvas = null, fullURL = null;
      const cropCache = {};

      const buildImage = () => {
        const cv = document.createElement('canvas'); cv.width = SRC; cv.height = SRC;
        const ctx = cv.getContext('2d', { willReadFrequently: true });

        // sky
        const sky = ctx.createLinearGradient(0, 0, 0, SRC);
        sky.addColorStop(0, '#6FB1FC'); sky.addColorStop(1, '#CFE9FF');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, SRC, SRC);

        // sun (with a soft core)
        ctx.fillStyle = '#FFD23F';
        ctx.beginPath(); ctx.arc(SRC * 0.74, SRC * 0.26, SRC * 0.11, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.beginPath(); ctx.arc(SRC * 0.74, SRC * 0.26, SRC * 0.065, 0, Math.PI * 2); ctx.fill();

        // clouds
        ctx.fillStyle = 'rgba(255,255,255,0.92)';
        const cloud = (cx, cy, s) => {
          [[0, 0, 1], [0.55, 0.12, 0.78], [-0.55, 0.12, 0.7], [0.22, -0.22, 0.68]]
            .forEach(([dx, dy, r]) => { ctx.beginPath(); ctx.arc(cx + dx * s, cy + dy * s, r * s * 0.5, 0, Math.PI * 2); ctx.fill(); });
        };
        cloud(SRC * 0.27, SRC * 0.21, SRC * 0.15);
        cloud(SRC * 0.52, SRC * 0.12, SRC * 0.10);

        // far hill
        ctx.fillStyle = '#8FBF6B';
        ctx.beginPath(); ctx.moveTo(0, SRC * 0.66);
        ctx.quadraticCurveTo(SRC * 0.30, SRC * 0.50, SRC * 0.55, SRC * 0.62);
        ctx.quadraticCurveTo(SRC * 0.80, SRC * 0.74, SRC, SRC * 0.56);
        ctx.lineTo(SRC, SRC); ctx.lineTo(0, SRC); ctx.closePath(); ctx.fill();

        // near hill
        ctx.fillStyle = '#5E9C57';
        ctx.beginPath(); ctx.moveTo(0, SRC * 0.81);
        ctx.quadraticCurveTo(SRC * 0.35, SRC * 0.66, SRC * 0.62, SRC * 0.80);
        ctx.quadraticCurveTo(SRC * 0.83, SRC * 0.90, SRC, SRC * 0.82);
        ctx.lineTo(SRC, SRC); ctx.lineTo(0, SRC); ctx.closePath(); ctx.fill();

        srcCanvas = cv;
        try { fullURL = cv.toDataURL(); } catch (_) { fullURL = null; }
      };
      const cropURL = (idx) => {
        if (cropCache[idx]) return cropCache[idx];
        const row = Math.floor(idx / GRID), col = idx % GRID;
        const OUT = 64, out = document.createElement('canvas'); out.width = OUT; out.height = OUT;
        const c = out.getContext('2d'); c.imageSmoothingEnabled = true;
        c.drawImage(srcCanvas, col * PX, row * PX, PX, PX, 0, 0, OUT, OUT);
        let url = ''; try { url = out.toDataURL(); } catch (_) { url = ''; }
        return (cropCache[idx] = url);
      };
      buildImage();

      const VBW = 1180, VBH = 492;
      const svg = d3.select(container).append('svg')
        .attr('viewBox', `0 0 ${VBW} ${VBH}`)
        .attr('preserveAspectRatio', 'xMidYMid meet')
        .style('width', '100%').style('height', 'auto').style('display', 'block');

      const defs = svg.append('defs');
      defs.append('marker')
        .attr('id', 'unroll-arrow').attr('viewBox', '0 0 10 10').attr('refX', 8).attr('refY', 5)
        .attr('markerWidth', 7).attr('markerHeight', 7).attr('orient', 'auto-start-reverse')
        .append('path').attr('d', 'M0,0 L10,5 L0,10 z').attr('fill', 'var(--muted-color)');

      function render() {
        svg.selectAll('g').remove();

        const frameByIdx = {};  // patch frame rects on the image (all 256)
        const tileByIdx = {};   // sequence tiles that are actually drawn

        const FRAME_STROKE = 'rgba(0,0,0,0.5)';
        const highlightPatch = (idx) => {
          const f = frameByIdx[idx]; if (f) f.attr('stroke', PAL.blue).attr('stroke-width', 3).attr('fill', 'rgba(91,155,213,0.28)');
          const t = tileByIdx[idx]; if (t) t.attr('stroke', PAL.blue).attr('stroke-width', 3);
        };
        const resetPatch = (idx) => {
          const f = frameByIdx[idx]; if (f) f.attr('stroke', FRAME_STROKE).attr('stroke-width', 1.25).attr('fill', 'transparent');
          const t = tileByIdx[idx]; if (t) t.attr('stroke', 'var(--border-color)').attr('stroke-width', 1.25);
        };

        // ---- LEFT: the 512x512 image with a 16x16 grid of framed patches ----
        const imgX = 40, imgY = 52, S = 384, cell = S / GRID; // 24 px per displayed patch
        const left = svg.append('g');

        if (fullURL) {
          left.append('image').attr('href', fullURL).attr('xlink:href', fullURL)
            .attr('x', imgX).attr('y', imgY).attr('width', S).attr('height', S)
            .attr('preserveAspectRatio', 'none');
        } else {
          left.append('rect').attr('x', imgX).attr('y', imgY).attr('width', S).attr('height', S)
            .attr('fill', 'color-mix(in oklab, var(--muted-color) 8%, var(--surface-bg))');
        }
        // outer image border
        left.append('rect').attr('x', imgX).attr('y', imgY).attr('width', S).attr('height', S)
          .attr('fill', 'none').attr('stroke', 'var(--text-color)').attr('stroke-width', 1.5);

        // one bold frame per patch (transparent fill keeps the whole cell hoverable)
        for (let row = 0; row < GRID; row++) {
          for (let col = 0; col < GRID; col++) {
            const idx = row * GRID + col;
            const f = left.append('rect').attr('class', 'frame')
              .attr('x', imgX + col * cell).attr('y', imgY + row * cell)
              .attr('width', cell).attr('height', cell)
              .attr('fill', 'transparent')
              .attr('stroke', FRAME_STROKE).attr('stroke-width', 1.25)
              .style('pointer-events', 'all');
            frameByIdx[idx] = f;
            f.on('mouseenter', () => highlightPatch(idx))
              .on('mousemove', (e) => showTip(e, `<b>Mảnh ảnh (hàng ${row}, cột ${col})</b><br>Vùng kích thước 32 × 32 px<br>Chỉ số chuỗi = ${row} · 16 + ${col} = <b>${idx}</b>`))
              .on('mouseleave', () => { resetPatch(idx); hideTip(); });
          }
        }

        const corner = (cx, cy, txt, anchor) => left.append('text')
          .attr('class', 'muted').attr('x', cx).attr('y', cy)
          .attr('text-anchor', anchor).attr('font-size', 10).text(txt);
        corner(imgX + 2, imgY - 5, '(0,0)', 'start');
        corner(imgX + S - 2, imgY - 5, '(0,15)', 'end');
        corner(imgX + 2, imgY + S + 14, '(15,0)', 'start');

        left.append('text').attr('class', 'caption')
          .attr('x', imgX + S / 2).attr('y', imgY + S + 36)
          .attr('text-anchor', 'middle').attr('font-size', 15)
          .text('Ảnh 512 × 512 — 16 × 16 = 256 mảnh ảnh');
        left.append('text').attr('class', 'muted')
          .attr('x', imgX + S / 2).attr('y', imgY + S + 56)
          .attr('text-anchor', 'middle').attr('font-size', 12.5)
          .text('mỗi mảnh là một vùng 32 × 32 px của ảnh');

        // ---- ARROW: image -> sequence ----
        const ax1 = imgX + S + 24, ax2 = 636, ay = imgY + S / 2;
        svg.append('text').attr('class', 'muted')
          .attr('x', (ax1 + ax2) / 2).attr('y', ay - 14)
          .attr('text-anchor', 'middle').attr('font-size', 13)
          .text('trải phẳng theo từng hàng');
        svg.append('path')
          .attr('d', `M${ax1},${ay} L${ax2},${ay}`)
          .attr('fill', 'none').attr('stroke', 'var(--muted-color)').attr('stroke-width', 2.5)
          .attr('marker-end', 'url(#unroll-arrow)');

        // ---- RIGHT: flat sequence — each slot shows the actual patch image ----
        const seq = svg.append('g');
        const tw = 44, gap = 12, tileY = ay - tw / 2;
        let cx = 660;

        const drawTile = (idx, showLabel) => {
          const x = cx, row = Math.floor(idx / GRID), col = idx % GRID;
          const url = cropURL(idx);
          if (url) {
            seq.append('image').attr('href', url).attr('xlink:href', url)
              .attr('x', x).attr('y', tileY).attr('width', tw).attr('height', tw)
              .attr('preserveAspectRatio', 'none').style('pointer-events', 'none');
          }
          const t = seq.append('rect').attr('class', 'tile')
            .attr('x', x).attr('y', tileY).attr('width', tw).attr('height', tw)
            .attr('rx', 3).attr('ry', 3)
            .attr('fill', url ? 'transparent' : 'color-mix(in oklab, var(--muted-color) 10%, var(--surface-bg))')
            .attr('stroke', 'var(--border-color)').attr('stroke-width', 1.25)
            .style('pointer-events', 'all');
          tileByIdx[idx] = t;
          t.on('mouseenter', () => highlightPatch(idx))
            .on('mousemove', (e) => showTip(e, `<b>Chỉ số chuỗi ${idx}</b><br>Mảnh ảnh (hàng ${row}, cột ${col})`))
            .on('mouseleave', () => { resetPatch(idx); hideTip(); });
          if (showLabel) {
            seq.append('text').attr('class', 'muted')
              .attr('x', x + tw / 2).attr('y', tileY + tw + 15)
              .attr('text-anchor', 'middle').attr('font-size', 11).text(String(idx));
          }
          cx += tw + gap;
        };
        const ellipsis = () => {
          seq.append('text').attr('class', 'muted')
            .attr('x', cx + 12).attr('y', tileY + tw / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
            .attr('font-size', 24).text('⋯');
          cx += 36;
        };

        [0, 1, 2].forEach((i) => drawTile(i, true));
        ellipsis();
        [119, 120, 121].forEach((i) => drawTile(i, true));
        ellipsis();
        [254, 255].forEach((i) => drawTile(i, true));

        const seqStart = 660, seqEnd = cx - gap;
        seq.append('text').attr('class', 'muted')
          .attr('x', (seqStart + seqEnd) / 2).attr('y', tileY + tw + 38)
          .attr('text-anchor', 'middle').attr('font-size', 14)
          .text('chuỗi phẳng gồm 256 vectơ mảnh ảnh');
      }
      render();

      if (!container.querySelector('.hint')) { const h = document.createElement('div'); h.className = 'hint'; h.textContent = 'Di chuột qua mảnh ảnh — trên hình ảnh hoặc trong chuỗi — để xem tọa độ (hàng, cột) và vị trí của nó trong chuỗi phẳng.'; container.appendChild(h); }

      if (window.ResizeObserver) { const ro = new ResizeObserver(() => render()); ro.observe(container); }
      else { window.addEventListener('resize', render); }
    };

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => ensureD3(bootstrap), { once: true }); }
    else { ensureD3(bootstrap); }
  })();
</script>
