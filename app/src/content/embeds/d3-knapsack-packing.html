<div class="d3-knapsack-packing"></div>
<style>
  .d3-knapsack-packing { position: relative; }
  .d3-knapsack-packing svg { width: 100%; height: auto; display: block; }
  .d3-knapsack-packing .title { fill: var(--text-color); font-weight: 700; }
  .d3-knapsack-packing .intro { fill: var(--text-color); }
  .d3-knapsack-packing .ks-label { fill: var(--text-color); font-weight: 700; }
  .d3-knapsack-packing .seg-label { fill: var(--text-color); }
  .d3-knapsack-packing .caption { fill: var(--muted-color); }
  .d3-knapsack-packing .seg rect { cursor: pointer; transition: stroke-width .12s ease; }
  .d3-knapsack-packing .hint { margin-top: 6px; font-size: 11.5px; color: var(--muted-color); }
</style>
<script>
  (() => {
    const ensureD3 = (cb) => {
      if (window.d3 && typeof window.d3.select === 'function') return cb();
      let s = document.getElementById('d3-cdn-script');
      if (!s) { s = document.createElement('script'); s.id = 'd3-cdn-script'; s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js'; document.head.appendChild(s); }
      const onReady = () => { if (window.d3 && typeof window.d3.select === 'function') cb(); };
      s.addEventListener('load', onReady, { once: true });
      if (window.d3) onReady();
    };

    const bootstrap = () => {
      const scriptEl = document.currentScript;
      let container = scriptEl ? scriptEl.previousElementSibling : null;
      if (!(container && container.classList && container.classList.contains('d3-knapsack-packing'))) {
        const cs = Array.from(document.querySelectorAll('.d3-knapsack-packing')).filter(el => !(el.dataset && el.dataset.mounted === 'true'));
        container = cs[cs.length - 1] || null;
      }
      if (!container) return;
      if (container.dataset) { if (container.dataset.mounted === 'true') return; container.dataset.mounted = 'true'; }
      container.style.position = container.style.position || 'relative';

      // Named semantic palette — the article's figure descriptions specify colours by name
      // (blue 800, green 700, pink 500, yellow 400). We keep them theme-aware by tinting
      // toward --surface-bg and using --text-color for labels.
      const PAL = { blue: '#5B9BD5', green: '#5FB97F', pink: '#E27BA4', red: '#E06C6C', purple: '#9B82DE', yellow: '#E3B25A', teal: '#46AFB0', gray: '#98A2AD' };
      const tint = (hex, amt) => `color-mix(in oklab, ${hex} ${Math.round((amt == null ? 0.3 : amt) * 100)}%, var(--surface-bg))`;

      // ---- single shared HTML tooltip (interactivity) ----
      let tip = container.querySelector('.d3-tooltip'), tipInner;
      if (!tip) {
        tip = document.createElement('div'); tip.className = 'd3-tooltip';
        Object.assign(tip.style, { position: 'absolute', top: '0', left: '0', transform: 'translate(-9999px,-9999px)', pointerEvents: 'none', maxWidth: '260px', padding: '8px 10px', borderRadius: '8px', fontSize: '12px', lineHeight: '1.4', border: '1px solid var(--border-color)', background: 'var(--surface-bg)', color: 'var(--text-color)', boxShadow: '0 4px 24px rgba(0,0,0,.18)', opacity: '0', transition: 'opacity .12s ease', zIndex: '5' });
        tipInner = document.createElement('div'); tip.appendChild(tipInner); container.appendChild(tip);
      } else { tipInner = tip.firstChild || tip; }
      const showTip = (event, html) => { tipInner.innerHTML = html; const [px, py] = d3.pointer(event, container); tip.style.transform = `translate(${px + 14}px, ${py + 14}px)`; tip.style.opacity = '1'; };
      const hideTip = () => { tip.style.opacity = '0'; };

      const VBW = 1000, VBH = 400;
      const svg = d3.select(container).append('svg')
        .attr('viewBox', `0 0 ${VBW} ${VBH}`)
        .attr('preserveAspectRatio', 'xMidYMid meet')
        .style('width', '100%').style('height', 'auto').style('display', 'block');

      const MAX = 2048;          // knapsack budget
      const BAR_X = 40, BAR_W = 900, BAR_H = 64;
      const scale = BAR_W / MAX; // px per length unit

      // One filled, hoverable sample segment inside a bar. `len` is the real token length.
      function segment(g, x, w, h, color, len) {
        const grp = g.append('g').attr('class', 'seg');
        const rect = grp.append('rect').attr('x', x).attr('y', 0).attr('width', w).attr('height', h)
          .attr('fill', tint(color, 0.35)).attr('stroke', color).attr('stroke-width', 2);
        grp.append('text').attr('class', 'seg-label')
          .attr('x', x + w / 2).attr('y', h / 2)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
          .attr('font-size', 16).text(String(len));
        const tipHtml = `<b>Sample</b><br>length = ${len} tokens`;
        grp.on('mouseenter', () => rect.attr('stroke-width', 4))
          .on('mousemove', (e) => showTip(e, tipHtml))
          .on('mouseleave', () => { rect.attr('stroke-width', 2); hideTip(); });
      }

      function render() {
        svg.selectAll('g').remove();

        // Intro lines (the figure title is provided by the HtmlEmbed figcaption).
        const intro = svg.append('g');
        intro.append('text').attr('class', 'intro').attr('x', BAR_X).attr('y', 40)
          .attr('font-size', 15).text('Sample lengths (sorted): [800, 700, 500, 400]');
        intro.append('text').attr('class', 'intro').attr('x', BAR_X).attr('y', 64)
          .attr('font-size', 15).text('Max knapsack length = 2048');

        // ---- Knapsack 1 ----
        const k1Top = 112;
        const k1 = svg.append('g');
        k1.append('text').attr('class', 'ks-label').attr('x', BAR_X).attr('y', k1Top - 10)
          .attr('font-size', 14).text('Knapsack 1:');

        const bar1 = k1.append('g').attr('transform', `translate(${BAR_X},${k1Top})`);
        // Clip the filled segments to the rounded bar outline.
        const clipId = 'ks-knapsack-packing-clip';
        const defs = svg.append('defs');
        defs.append('clipPath').attr('id', clipId)
          .append('rect').attr('x', 0).attr('y', 0).attr('width', BAR_W).attr('height', BAR_H)
          .attr('rx', 10).attr('ry', 10);
        const fills1 = bar1.append('g').attr('clip-path', `url(#${clipId})`);

        // 800 = blue, 700 = green, 500 = pink (named semantic colours).
        const lens = [800, 700, 500];
        const colors = [PAL.blue, PAL.green, PAL.pink];
        let cursor = 0;
        lens.forEach((len, i) => {
          const w = len * scale;
          segment(fills1, cursor, w, BAR_H, colors[i], len);
          cursor += w;
        });
        // PAD sliver fills the remainder to 2048 — thin gray, hoverable.
        const padW = BAR_W - cursor;
        const padGrp = fills1.append('g').attr('class', 'seg');
        const padRect = padGrp.append('rect').attr('x', cursor).attr('y', 0).attr('width', padW).attr('height', BAR_H)
          .attr('fill', tint(PAL.gray, 0.4))
          .attr('stroke', 'var(--border-color)').attr('stroke-width', 1);
        padGrp.append('text').attr('class', 'caption')
          .attr('x', cursor + padW / 2).attr('y', BAR_H / 2)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
          .attr('font-size', 11).text('PAD');
        const padTip = '<b>Padding</b><br>48 filler tokens so the packed sequence is exactly 2048 long. Added only once, at the end.';
        padGrp.on('mouseenter', () => padRect.attr('stroke-width', 3))
          .on('mousemove', (e) => showTip(e, padTip))
          .on('mouseleave', () => { padRect.attr('stroke-width', 1); hideTip(); });

        // Rounded bar outline on top.
        bar1.append('rect').attr('x', 0).attr('y', 0).attr('width', BAR_W).attr('height', BAR_H)
          .attr('rx', 10).attr('ry', 10).attr('fill', 'none')
          .attr('stroke', 'var(--border-color)').attr('stroke-width', 1.5);

        // Caption below the bar.
        k1.append('text').attr('class', 'caption').attr('x', BAR_X).attr('y', k1Top + BAR_H + 18)
          .attr('font-size', 12).text('Total = 2000');
        // Fullness annotation at top-right.
        k1.append('text').attr('x', BAR_X + BAR_W).attr('y', k1Top - 10)
          .attr('text-anchor', 'end').attr('font-size', 13)
          .attr('fill', PAL.green).text('97.6% full');

        // ---- Knapsack 2 ----
        const k2Top = 262;
        const k2 = svg.append('g');
        k2.append('text').attr('class', 'ks-label').attr('x', BAR_X).attr('y', k2Top - 10)
          .attr('font-size', 14).text('Knapsack 2:');

        const bar2 = k2.append('g').attr('transform', `translate(${BAR_X},${k2Top})`);
        // Single yellow segment at the left.
        const w400 = 400 * scale;
        segment(bar2, 0, w400, BAR_H, PAL.yellow, 400);
        // Dashed empty container outline.
        bar2.append('rect').attr('x', 0).attr('y', 0).attr('width', BAR_W).attr('height', BAR_H)
          .attr('rx', 10).attr('ry', 10).attr('fill', 'none')
          .attr('stroke', 'var(--border-color)').attr('stroke-width', 1.5)
          .attr('stroke-dasharray', '6 6');
        // "keep accumulating" note to the right of the segment.
        bar2.append('text').attr('x', w400 + 16).attr('y', BAR_H / 2)
          .attr('dominant-baseline', 'central').attr('font-size', 13)
          .attr('fill', PAL.yellow).text('(keep accumulating)');
      }
      render();

      // Muted HTML hint below the SVG.
      if (!container.querySelector('.hint')) { const h = document.createElement('div'); h.className = 'hint'; h.textContent = 'Hover a segment for its length.'; container.appendChild(h); }

      if (window.ResizeObserver) { const ro = new ResizeObserver(() => render()); ro.observe(container); }
      else { window.addEventListener('resize', render); }
    };

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => ensureD3(bootstrap), { once: true }); }
    else { ensureD3(bootstrap); }
  })();
</script>
