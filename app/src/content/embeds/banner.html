<div class="d3-pipeline-banner" style="width:100%;margin:10px 0;aspect-ratio:3/1;min-height:260px;"></div>
<style>
  .d3-pipeline-banner { position: relative; }
  .d3-pipeline-banner svg { width: 100%; height: 100%; display: block; }
  .d3-pipeline-banner .lbl { fill: var(--muted-color); font-size: 13px; font-weight: 600; letter-spacing: .02em; }
  .d3-pipeline-banner .node-lbl { fill: var(--text-color); font-weight: 700; }
</style>
<script>
  (() => {
    const ensureD3 = (cb) => {
      if (window.d3 && typeof window.d3.select === 'function') return cb();
      let s = document.getElementById('d3-cdn-script');
      if (!s) { s = document.createElement('script'); s.id = 'd3-cdn-script'; s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js'; document.head.appendChild(s); }
      const onReady = () => { if (window.d3 && typeof window.d3.select === 'function') cb(); };
      s.addEventListener('load', onReady, { once: true });
      if (window.d3) onReady();
    };

    const bootstrap = () => {
      const scriptEl = document.currentScript;
      let container = scriptEl ? scriptEl.previousElementSibling : null;
      if (!(container && container.classList && container.classList.contains('d3-pipeline-banner'))) {
        const cs = Array.from(document.querySelectorAll('.d3-pipeline-banner')).filter(el => !(el.dataset && el.dataset.mounted === 'true'));
        container = cs[cs.length - 1] || null;
      }
      if (!container) return;
      if (container.dataset) { if (container.dataset.mounted === 'true') return; container.dataset.mounted = 'true'; }
      container.style.position = container.style.position || 'relative';

      // Named semantic palette, consistent with the article's figures.
      const PAL = { blue: '#5B9BD5', green: '#5FB97F', pink: '#E27BA4', red: '#E06C6C', purple: '#9B82DE', yellow: '#E3B25A', teal: '#46AFB0' };
      const tint = (hex, amt) => `color-mix(in oklab, ${hex} ${Math.round(amt * 100)}%, var(--surface-bg))`;
      const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const VBW = 1200, VBH = 400;
      const svg = d3.select(container).append('svg')
        .attr('viewBox', `0 0 ${VBW} ${VBH}`).attr('preserveAspectRatio', 'xMidYMid meet')
        .style('width', '100%').style('height', '100%').style('display', 'block');

      const defs = svg.append('defs');
      defs.append('marker').attr('id', 'pb-arrow').attr('viewBox', '0 0 10 10').attr('refX', 8).attr('refY', 5)
        .attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto-start-reverse')
        .append('path').attr('d', 'M0,0 L10,5 L0,10 z').attr('fill', 'var(--muted-color)');

      // ---- geometry ----
      const N = 16, cell = 14, gap = 1.6, step = cell + gap;
      const gridSize = N * cell + (N - 1) * gap;
      const gx = 78, gy = (VBH - gridSize) / 2 - 14;
      const laneY = gy + gridSize / 2;
      const laneStart = gx + gridSize + 46;
      const nodeW = 76, nodeH = 76, nodeX = VBW - 110, nodeCx = nodeX + nodeW / 2, nodeCy = laneY;
      const laneEnd = nodeX - 18;

      // ---- the "image": a 16×16 grid coloured by a soft bilinear blend of four hues ----
      const TL = PAL.purple, TR = PAL.blue, BL = PAL.pink, BR = PAL.teal;
      const cellColor = (r, c) => {
        const u = c / (N - 1), v = r / (N - 1);
        const top = d3.interpolateLab(TL, TR)(u);
        const bot = d3.interpolateLab(BL, BR)(u);
        return d3.interpolateLab(top, bot)(v);
      };
      const gGrid = svg.append('g');
      for (let r = 0; r < N; r++) {
        for (let c = 0; c < N; c++) {
          gGrid.append('rect')
            .attr('x', gx + c * step).attr('y', gy + r * step)
            .attr('width', cell).attr('height', cell).attr('rx', 2.5)
            .attr('fill', `color-mix(in oklab, ${cellColor(r, c)} 72%, var(--surface-bg))`)
            .attr('stroke', 'var(--surface-bg)').attr('stroke-width', 0.8).attr('stroke-opacity', 0.5);
        }
      }
      // a scan highlight that sweeps row by row (the "unroll")
      const scan = gGrid.append('rect').attr('x', gx - 2).attr('width', gridSize + 4).attr('height', step)
        .attr('rx', 3).attr('fill', 'none').attr('stroke', 'var(--text-color)').attr('stroke-width', 1.4).attr('opacity', 0);

      // ---- the lane: image patches + text tokens flow into the decoder ----
      const gLane = svg.append('g');
      gLane.append('path').attr('d', `M${laneStart - 8},${laneY} L${laneEnd - 2},${laneY}`)
        .attr('fill', 'none').attr('stroke', 'var(--border-color)').attr('stroke-width', 1.5)
        .attr('stroke-dasharray', '2 6').attr('marker-end', 'url(#pb-arrow)');

      // decoder node (pink)
      const gNode = svg.append('g');
      const nodeRect = gNode.append('rect').attr('x', nodeX).attr('y', nodeCy - nodeH / 2)
        .attr('width', nodeW).attr('height', nodeH).attr('rx', 14)
        .attr('fill', tint(PAL.pink, 0.34)).attr('stroke', PAL.pink).attr('stroke-width', 2);
      gNode.append('text').attr('class', 'node-lbl').attr('x', nodeCx).attr('y', nodeCy)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central').attr('font-size', 20).text('LM');

      // micro-labels
      svg.append('text').attr('class', 'lbl').attr('x', gx + gridSize / 2).attr('y', gy + gridSize + 22)
        .attr('text-anchor', 'middle').text('image → 16×16 patches');
      svg.append('text').attr('class', 'lbl').attr('x', (laneStart + laneEnd) / 2).attr('y', laneY + 54)
        .attr('text-anchor', 'middle').text('patch + text tokens');
      svg.append('text').attr('class', 'lbl').attr('x', nodeCx).attr('y', nodeCy + nodeH / 2 + 22)
        .attr('text-anchor', 'middle').text('decoder');

      // ---- token chips flowing along the lane ----
      const NUM = 22, chipW = 26, chipH = 26;
      const gChips = svg.append('g');
      const chips = d3.range(NUM).map(i => {
        const isText = (i % 5 === 4);            // every 5th chip is a text token (purple)
        const color = isText ? PAL.purple : PAL.blue;
        const rect = gChips.append('rect').attr('width', chipW).attr('height', chipH).attr('rx', 7)
          .attr('y', laneY - chipH / 2)
          .attr('fill', tint(color, 0.36)).attr('stroke', color).attr('stroke-width', 1.6);
        return { rect, phase: i / NUM, isText };
      });

      const fade = (a) => a < 0.07 ? a / 0.07 : (a > 0.9 ? Math.max(0, (1 - a) / 0.1) : 1);
      const place = (chip, a) => {
        const x = laneStart + a * (laneEnd - laneStart) - chipW / 2;
        chip.rect.attr('x', x).attr('opacity', fade(a) * 0.96);
      };

      if (reduce) {
        // static frame: spread chips along the lane, fixed scan row
        chips.forEach(c => place(c, c.phase));
        scan.attr('y', gy + 7 * step - gap / 2).attr('opacity', 0.4);
        return;
      }

      const LANE_MS = 9000, SCAN_MS = 9000;
      let raf = 0, t0 = 0, running = false;
      const frame = (now) => {
        if (!t0) t0 = now;
        const e = now - t0;
        chips.forEach(c => place(c, ((e / LANE_MS) + c.phase) % 1));
        const sp = (e % SCAN_MS) / SCAN_MS;
        const row = Math.floor(sp * N);
        scan.attr('y', gy + row * step - gap / 2).attr('opacity', 0.55 - 0.4 * ((sp * N) % 1));
        const pulse = 1 + 0.05 * Math.sin(e / 520);
        nodeRect.attr('transform', `translate(${nodeCx},${nodeCy}) scale(${pulse}) translate(${-nodeCx},${-nodeCy})`);
        raf = requestAnimationFrame(frame);
      };
      const start = () => { if (!running) { running = true; t0 = 0; raf = requestAnimationFrame(frame); } };
      const stop = () => { running = false; if (raf) cancelAnimationFrame(raf); raf = 0; };

      // pause when the banner scrolls out of view (perf)
      if (window.IntersectionObserver) {
        const io = new IntersectionObserver((ents) => { ents.forEach(en => en.isIntersecting ? start() : stop()); }, { threshold: 0 });
        io.observe(container);
      } else { start(); }
    };

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => ensureD3(bootstrap), { once: true }); }
    else { ensureD3(bootstrap); }
  })();
</script>
