<div class="d3-loss-mask"></div>
<style>
  .d3-loss-mask { position: relative; }
  .d3-loss-mask svg { width: 100%; height: auto; display: block; }
  .d3-loss-mask .tok { fill: var(--text-color); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .d3-loss-mask .pos { fill: var(--muted-color); }
  .d3-loss-mask .badge-sym { font-weight: 700; }
  .d3-loss-mask .step { cursor: pointer; }
  .d3-loss-mask .legend { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; margin-top: 12px; }
  .d3-loss-mask .legend-title { font-size: 12px; font-weight: 700; color: var(--text-color); }
  .d3-loss-mask .legend .items { display: flex; flex-wrap: wrap; gap: 8px 14px; }
  .d3-loss-mask .legend .item { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; font-size: 12px; color: var(--text-color); }
  .d3-loss-mask .legend .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border-color); }
  .d3-loss-mask .hint { margin-top: 6px; font-size: 11.5px; color: var(--muted-color); }
</style>
<script>
  (() => {
    const ensureD3 = (cb) => {
      if (window.d3 && typeof window.d3.select === 'function') return cb();
      let s = document.getElementById('d3-cdn-script');
      if (!s) { s = document.createElement('script'); s.id = 'd3-cdn-script'; s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js'; document.head.appendChild(s); }
      const onReady = () => { if (window.d3 && typeof window.d3.select === 'function') cb(); };
      s.addEventListener('load', onReady, { once: true });
      if (window.d3) onReady();
    };

    const bootstrap = () => {
      const scriptEl = document.currentScript;
      let container = scriptEl ? scriptEl.previousElementSibling : null;
      if (!(container && container.classList && container.classList.contains('d3-loss-mask'))) {
        const cs = Array.from(document.querySelectorAll('.d3-loss-mask')).filter(el => !(el.dataset && el.dataset.mounted === 'true'));
        container = cs[cs.length - 1] || null;
      }
      if (!container) return;
      if (container.dataset) { if (container.dataset.mounted === 'true') return; container.dataset.mounted = 'true'; }
      container.style.position = container.style.position || 'relative';

      const PAL = { blue: '#5B9BD5', green: '#5FB97F', pink: '#E27BA4', red: '#E06C6C', purple: '#9B82DE', yellow: '#E3B25A', teal: '#46AFB0', gray: '#98A2AD' };
      const tint = (hex, amt) => `color-mix(in oklab, ${hex} ${Math.round((amt == null ? 0.3 : amt) * 100)}%, var(--surface-bg))`;
      const KEEP = PAL.green, SKIP = PAL.gray;

      let tip = container.querySelector('.d3-tooltip'), tipInner;
      if (!tip) {
        tip = document.createElement('div'); tip.className = 'd3-tooltip';
        Object.assign(tip.style, { position: 'absolute', top: '0', left: '0', transform: 'translate(-9999px,-9999px)', pointerEvents: 'none', maxWidth: '250px', padding: '8px 10px', borderRadius: '8px', fontSize: '12px', lineHeight: '1.4', border: '1px solid var(--border-color)', background: 'var(--surface-bg)', color: 'var(--text-color)', boxShadow: '0 4px 24px rgba(0,0,0,.18)', opacity: '0', transition: 'opacity .12s ease', zIndex: '5' });
        tipInner = document.createElement('div'); tip.appendChild(tipInner); container.appendChild(tip);
      } else { tipInner = tip.firstChild || tip; }
      const showTip = (event, html) => { tipInner.innerHTML = html; const [px, py] = d3.pointer(event, container); tip.style.transform = `translate(${px + 14}px, ${py + 14}px)`; tip.style.opacity = '1'; };
      const hideTip = () => { tip.style.opacity = '0'; };

      // The token sequence. Each token is trained to predict the NEXT one (next-token
      // prediction). A step counts toward the loss only when its target is real text.
      const seq = [
        { tok: 'IMG', type: 'img' },
        { tok: 'IMG', type: 'img' },
        { tok: '42', type: 'txt' },
        { tok: '87', type: 'txt' },
        { tok: 'EOS', type: 'txt' },
        { tok: 'PAD', type: 'pad' },
        { tok: 'PAD', type: 'pad' },
      ];
      const typeColor = (t) => t === 'img' ? PAL.blue : (t === 'pad' ? PAL.gray : PAL.green);
      const typeName = (t) => t === 'img' ? 'token hình ảnh' : (t === 'pad' ? 'đệm (padding)' : 'token văn bản');

      const VBW = 920, VBH = 240;
      const svg = d3.select(container).append('svg')
        .attr('viewBox', `0 0 ${VBW} ${VBH}`).attr('preserveAspectRatio', 'xMidYMid meet')
        .style('width', '100%').style('height', 'auto').style('display', 'block');
      const defs = svg.append('defs');
      [['lm-keep', KEEP], ['lm-skip', SKIP]].forEach(([id, c]) => defs.append('marker')
        .attr('id', id).attr('viewBox', '0 0 10 10').attr('refX', 8).attr('refY', 5)
        .attr('markerWidth', 7).attr('markerHeight', 7).attr('orient', 'auto-start-reverse')
        .append('path').attr('d', 'M0,0 L10,5 L0,10 z').attr('fill', c));

      const n = seq.length, boxW = 92, boxH = 54, gap = 18;
      const totalW = n * boxW + (n - 1) * gap;
      const startX = (VBW - totalW) / 2;
      const boxTop = 150, topY = boxTop;
      const cx = (i) => startX + i * (boxW + gap) + boxW / 2;

      function render() {
        svg.selectAll('g').remove();

        const arcs = svg.append('g');
        for (let t = 0; t < n - 1; t++) {
          const tgt = seq[t + 1], keep = tgt.type === 'txt';
          const col = keep ? KEEP : SKIP;
          const x0 = cx(t), x1 = cx(t + 1), mid = (x0 + x1) / 2;
          const g = arcs.append('g').attr('class', 'step');
          g.append('path')
            .attr('d', `M${x0},${topY} Q${mid},40 ${x1},${topY}`)
            .attr('fill', 'none').attr('stroke', col).attr('stroke-width', 2)
            .attr('opacity', keep ? 1 : 0.7)
            .attr('marker-end', `url(#${keep ? 'lm-keep' : 'lm-skip'})`);
          g.append('circle').attr('cx', mid).attr('cy', 95).attr('r', 13)
            .attr('fill', tint(col, 0.4)).attr('stroke', col).attr('stroke-width', 1.6);
          g.append('text').attr('class', 'badge-sym').attr('x', mid).attr('y', 96)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
            .attr('font-size', 15).attr('fill', col).text(keep ? '✓' : '✗');
          const why = keep
            ? `được tính vào hàm mất mát (✓).`
            : `là ${typeName(tgt.type)} → bị bỏ qua (nhãn của nó được đặt thành <code>-100</code>).`;
          g.on('mousemove', (e) => showTip(e, `<b>Vị trí ${t} → ${t + 1}</b><br>Dự đoán token tiếp theo (<code>${tgt.tok}</code>), và bước này ${why}`))
            .on('mouseleave', hideTip);
        }

        const row = svg.append('g');
        seq.forEach((d, i) => {
          const x = startX + i * (boxW + gap), color = typeColor(d.type);
          const g = row.append('g').attr('class', 'step');
          g.append('rect').attr('x', x).attr('y', boxTop).attr('width', boxW).attr('height', boxH)
            .attr('rx', 9).attr('fill', tint(color, 0.32)).attr('stroke', color).attr('stroke-width', 1.6);
          g.append('text').attr('class', 'tok').attr('x', x + boxW / 2).attr('y', boxTop + boxH / 2)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'central').attr('font-size', 16).text(d.tok);
          g.append('text').attr('class', 'pos').attr('x', x + boxW / 2).attr('y', boxTop + boxH + 18)
            .attr('text-anchor', 'middle').attr('font-size', 12).text('pos ' + i);
          g.on('mousemove', (e) => showTip(e, `<b>Vị trí ${i}: ${d.tok}</b><br>Là một ${typeName(d.type)}.`))
            .on('mouseleave', hideTip);
        });
      }
      render();

      let legend = container.querySelector('.legend');
      if (!legend) { legend = document.createElement('div'); legend.className = 'legend'; legend.innerHTML = '<div class="legend-title">Chú giải</div><div class="items"></div>'; container.appendChild(legend); }
      const items = legend.querySelector('.items'); items.innerHTML = '';
      [['Token hình ảnh', PAL.blue], ['Token văn bản', PAL.green], ['Đệm (padding)', PAL.gray], ['✓ được tính vào hàm mất mát', KEEP], ['✗ bị bỏ qua (−100)', SKIP]].forEach(([name, color]) => {
        const el = document.createElement('span'); el.className = 'item';
        const sw = document.createElement('span'); sw.className = 'swatch'; sw.style.background = tint(color, 0.4); sw.style.borderColor = color;
        const tx = document.createElement('span'); tx.textContent = name; el.appendChild(sw); el.appendChild(tx); items.appendChild(el);
      });
      if (!container.querySelector('.hint')) { const h = document.createElement('div'); h.className = 'hint'; h.textContent = 'Mỗi token dự đoán token tiếp theo (mũi tên). Di chuột qua một mũi tên để xem bước đó có được tính điểm hay không.'; container.appendChild(h); }

      if (window.ResizeObserver) { const ro = new ResizeObserver(() => render()); ro.observe(container); }
      else { window.addEventListener('resize', render); }
    };

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => ensureD3(bootstrap), { once: true }); }
    else { ensureD3(bootstrap); }
  })();
</script>
